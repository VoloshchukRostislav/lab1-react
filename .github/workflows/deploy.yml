name: Deploy static content to Pages
on:
  push:
    branches: ['master']
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './lab1-react/package-lock.json'
      - name: Install dependencies
        run: npm install
        working-directory: ./lab1-react
      - name: Build
        run: npm run build
        working-directory: ./lab1-react
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './lab1-react/dist' # Вказуємо на папку всередині підпапки
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
